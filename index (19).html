<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://dtkwoxjuhmdmpnmynjtg.supabase.co/storage/v1/object/public/Portafolio/portafolio/Logo%20v1.PNG">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMBAR Couture - Vista Previa</title>
<link rel="preconnect" href="https://dtkwoxjuhmdmpnmynjtg.supabase.co">
<link rel="dns-prefetch" href="https://dtkwoxjuhmdmpnmynjtg.supabase.co">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0C0A; --paper:#FFFFFF; --warm:#F5F0E8; --border:rgba(196,154,60,0.2);
  --gold:#C49A3C; --gold-l:#DCBA6A; --gold-pale:#F5E8C4;
  --muted:#6B6460; --sage:#7D9E7F; --rose:#B87870;
  --border:rgba(196,154,60,0.2); --border-s:rgba(196,154,60,0.45);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'Outfit',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#FFFFFF;font-family:var(--font-b);color:#0E0C0A;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.75rem 3rem;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(14,12,10,0.08);
}
.nav-logo{display:flex;align-items:center;gap:0.9rem;text-decoration:none;}
.nav-logo img{height:48px;width:auto;}
.nav-logo-text{display:flex;flex-direction:column;line-height:1;}
.nav-logo-name{font-family:var(--font-d);font-size:1.5rem;font-weight:400;letter-spacing:0.22em;color:var(--paper);}
.nav-logo-sub{font-size:0.48rem;letter-spacing:0.45em;text-transform:uppercase;color:var(--gold);margin-top:1px;opacity:0.7;}
.nav-links{display:flex;align-items:center;gap:2.5rem;}
.nav-link{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(14,12,10,0.55);text-decoration:none;transition:color 0.2s;}
.nav-link:hover{color:var(--gold);}
.nav-cta{padding:0.7rem 1.8rem;background:var(--gold);color:#0E0C0A;font-weight:700;font-size:0.62rem;letter-spacing:0.2em;font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;text-decoration:none;transition:background 0.25s;}
.nav-cta:hover{background:var(--gold);}
/* Hamburger */
.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;}
.nav-ham span{display:block;width:22px;height:1.5px;background:var(--ink);transition:all 0.3s;}
.nav-ham.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.nav-ham.open span:nth-child(2){opacity:0;}
.nav-ham.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
/* Mobile menu */
.nav-mobile{display:none;flex-direction:column;position:fixed;top:57px;left:0;right:0;z-index:199;
  background:rgba(14,12,10,0.98);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:0.5rem 0 1rem;
  animation:menuDrop 0.25s ease both;}
@keyframes menuDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.nav-mobile.open{display:flex;}
.nav-mobile a{padding:0.85rem 1.5rem;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);transition:color 0.2s;}
.nav-mobile a:hover{color:var(--ink);}
.nav-mobile-cta{background:var(--ink);color:var(--paper)!important;margin:0.75rem 1.25rem 0;
  text-align:center;padding:0.85rem!important;border-bottom:none!important;}
@media(max-width:768px){.nav-ham{display:flex;}}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:grid;grid-template-columns:55% 45%;
  overflow:hidden;
}
.hero-text{
  padding:5rem 4rem;
  display:flex;flex-direction:column;justify-content:center;
  background:var(--paper);
}
.hero-tag{
  font-size:0.55rem;letter-spacing:0.42em;text-transform:uppercase;
  color:var(--gold);display:flex;align-items:center;gap:0.7rem;margin-bottom:1.75rem;
}
.hero-tag::before{content:'';width:22px;height:1px;background:var(--gold);}
.hero-title{
  font-family:var(--font-d);font-size:clamp(3rem,5vw,5rem);
  font-weight:300;line-height:1.05;letter-spacing:-0.02em;margin-bottom:1.5rem;
}
.hero-title em{font-style:italic;color:var(--gold);}
.hero-desc{
  font-size:0.85rem;color:var(--muted);line-height:1.9;
  font-weight:300;max-width:400px;margin-bottom:2.5rem;
}
.hero-actions{display:flex;flex-direction:column;gap:0.75rem;align-items:stretch;max-width:320px;}
.btn-p{
  padding:1rem 2.5rem;background:var(--gold);color:#0E0C0A;display:block;width:100%;font-weight:600;font-size:0.72rem;letter-spacing:0.25em;
  font-family:var(--font-b);font-size:0.68rem;letter-spacing:0.22em;
  text-transform:uppercase;text-decoration:none;transition:background 0.25s;
}
.btn-p:hover{background:var(--gold);}
.btn-g{
  padding:0.9rem 1.5rem;border:1px solid var(--border);color:var(--muted);
  font-family:var(--font-b);font-size:0.68rem;letter-spacing:0.2em;
  text-transform:uppercase;text-decoration:none;transition:all 0.25s;
}
.btn-g:hover{border-color:var(--gold);color:var(--gold-l);}
.hero-stats{
  display:flex;gap:2.5rem;margin-top:3rem;
  padding-top:2rem;border-top:1px solid var(--border);
}
.hs-num{font-family:var(--font-d);font-size:2.2rem;font-weight:300;line-height:1;}
.hs-lbl{font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* Hero mosaic */
.hero-mosaic{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:50vh 50vh;gap:3px;height:100vh;min-height:600px;contain:layout style;}
.photo-a{
  grid-row:1/3;
  image-rendering:auto;
  background:url("https://dtkwoxjuhmdmpnmynjtg.supabase.co/storage/v1/object/public/Portafolio/portafolio/1774447254052_5fl0.jpg") center/cover no-repeat;
  position:relative;overflow:hidden;
}
.photo-b{background:url("https://dtkwoxjuhmdmpnmynjtg.supabase.co/storage/v1/object/public/Portafolio/portafolio/1774447249979_9zru.jpg") center/cover no-repeat;height:100%;}
.photo-c{background:url("https://dtkwoxjuhmdmpnmynjtg.supabase.co/storage/v1/object/public/Portafolio/portafolio/IMG_4349.jpg") center/cover no-repeat;height:100%;}
.photo-a::after{
  content:'AMBAR COUTURE';
  position:absolute;bottom:1.5rem;left:1.5rem;
  font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(250,247,242,0.7);
}

/* ── SEDES STRIP ── */






.sede-icon{font-size:1.3rem;}
.sede-name{font-size:0.78rem;font-weight:400;color:var(--paper);}
.sede-desc{font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(250,247,242,0.38);margin-top:2px;}
.sede-count{margin-left:auto;font-size:0.58rem;color:rgba(196,154,60,0.65);white-space:nowrap;}

/* ── CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5rem;}
.cards-grid.feat{grid-template-columns:2fr 1fr 1fr;}

.card{
  cursor:pointer;overflow:hidden;border:1px solid transparent;
  transition:all 0.3s;background:#1A1612;
}
.card:hover{border-color:var(--border-s);transform:translateY(-3px);box-shadow:0 16px 48px rgba(14,12,10,0.1);}
.card.fc{grid-row:1/2;}

.card-photo{position:relative;overflow:hidden;}
.card.fc .card-photo{height:440px;}
.card:not(.fc) .card-photo{height:290px;}
.card-photo-bg{width:100%;height:100%;transition:transform 0.5s ease;}
.card:hover .card-photo-bg{transform:scale(1.05);}

.badge-sede{
  position:absolute;top:0.7rem;left:0.7rem;
  padding:0.25rem 0.65rem;background:rgba(14,12,10,0.72);
  backdrop-filter:blur(8px);font-size:0.5rem;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--paper);display:flex;align-items:center;gap:0.35rem;
}
.badge-tipo{
  position:absolute;top:0.7rem;right:0.7rem;
  padding:0.25rem 0.65rem;font-size:0.5rem;letter-spacing:0.15em;text-transform:uppercase;
}
.bt-pg{background:rgba(196,154,60,0.88);color:var(--ink);}
.bt-mk{background:rgba(180,120,122,0.88);color:var(--paper);}
.bt-hr{background:rgba(125,158,127,0.88);color:var(--paper);}
.dot-avail{
  position:absolute;bottom:0.7rem;right:0.7rem;
  width:8px;height:8px;border-radius:50%;border:1.5px solid var(--paper);
}
.da-y{background:var(--sage);}.da-n{background:var(--rose);}

.card-thumbs{display:flex;gap:2px;padding:0.35rem 0.35rem 0;background:#1A1612;}
.card-thumb{flex:1;height:50px;transition:flex 0.3s,opacity 0.2s;opacity:0.72;}
.card-thumb:hover{flex:2;opacity:1;}

.card-body{padding:1rem 1.1rem 1.2rem;background:#FFFFFF;}
.card-name{font-family:var(--font-d);font-size:1.2rem;font-weight:400;color:#0E0C0A;margin-bottom:2px;}
.card-role{font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:0.28rem;margin-bottom:0.75rem;}
.card-tag{padding:0.18rem 0.5rem;border:1px solid var(--border);font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.card-bottom{display:flex;align-items:flex-end;justify-content:space-between;}
.card-price{font-family:var(--font-d);font-size:1.25rem;font-weight:400;}
.card-price-lbl{font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.card-rating{font-size:0.68rem;color:var(--gold);}
.card-sessions{font-size:0.52rem;color:var(--muted);margin-top:2px;}
.hd{display:flex;gap:1rem;margin-bottom:0.7rem;}
.hd-item{font-size:0.6rem;color:var(--muted);}
.hd-item strong{color:var(--ink);font-weight:400;display:block;font-size:0.66rem;}

.empty-state{padding:4rem;text-align:center;border:1.5px dashed var(--border);grid-column:1/-1;font-size:0.8rem;color:var(--muted);}

/* ── FOOTER ── */
footer{background:#0E0C0A;color:#FAF7F2;padding:3rem 3rem 2.5rem;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2.5rem;margin-bottom:2.5rem;}
.footer-brand{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
.footer-brand img{height:52px;width:auto;filter:brightness(0.9);}
.footer-brand-text{font-family:var(--font-d);font-size:1.3rem;letter-spacing:0.2em;color:var(--gold-l);}
.footer-brand-sub{font-size:0.44rem;letter-spacing:0.4em;text-transform:uppercase;color:rgba(196,154,60,0.5);margin-top:2px;}
.footer-desc{font-size:0.72rem;color:rgba(250,247,242,0.4);line-height:1.85;font-weight:300;}
.footer-title{font-size:0.54rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold-l);margin-bottom:1rem;}
.footer-link{display:block;font-size:0.7rem;color:rgba(250,247,242,0.45);text-decoration:none;margin-bottom:0.5rem;transition:color 0.2s;}
.footer-link:hover{color:var(--paper);}
.footer-bottom{
  border-top:1px solid rgba(196,154,60,0.12);padding-top:1.5rem;
  display:flex;justify-content:space-between;align-items:center;
  font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(250,247,242,0.25);
}

/* ======================================
   RESPONSIVE - TABLET (≤ 1024px)
====================================== */


/* == PAQUETES == */
.paquetes-section{padding:5rem 3rem;background:var(--bg-dark);}
.paq-header{text-align:center;margin-bottom:2.5rem;}
.paq-eyebrow{font-size:.52rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:.65rem;margin-bottom:1rem;}
.paq-eyebrow::before,.paq-eyebrow::after{content:'';width:24px;height:1px;background:var(--gold);}
.paq-title{font-family:var(--font-d);font-size:clamp(2rem,4vw,3rem);font-weight:300;color:var(--paper);margin-bottom:.65rem;line-height:1.1;}
.paq-title em{font-style:italic;color:var(--gold-l);}
.paq-subtitle{font-size:.78rem;color:rgba(250,247,242,.4);max-width:520px;margin:0 auto;line-height:1.75;}
.paq-sedes-title{text-align:center;font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(250,247,242,.3);margin-bottom:1rem;}
.paq-sede-btns{display:flex;justify-content:center;gap:.5rem;margin-bottom:2.5rem;flex-wrap:wrap;}
.paq-sede-btn{padding:.6rem 1.5rem;border:1.5px solid rgba(196,154,60,.25);background:transparent;color:rgba(250,247,242,.4);font-family:var(--font-b);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .22s;}
.paq-sede-btn:hover{border-color:var(--gold);color:var(--gold);}
.paq-sede-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:500;}
.paq-panel{display:none;}
.paq-panel.active{display:block;animation:paqIn .3s ease;}
@keyframes paqIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.paq-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:820px;margin:0 auto;}
.paq-card{border:1px solid rgba(250,247,242,.08);overflow:hidden;transition:all .3s;}
.paq-card:hover{border-color:rgba(196,154,60,.3);transform:translateY(-3px);}
.paq-card.featured{border-color:rgba(196,154,60,.4);box-shadow:0 8px 40px rgba(196,154,60,.12);}
.paq-card-top{padding:1.5rem 1.5rem 1.25rem;background:var(--ink);position:relative;}
.paq-card.featured .paq-card-top{background:var(--gold);}
.paq-badge{font-size:.46rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem;}
.paq-card.featured .paq-badge{color:var(--ink);}
.paq-sede{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(250,247,242,.4);margin-bottom:.35rem;}
.paq-card.featured .paq-sede{color:rgba(14,12,10,.5);}
.paq-name{font-family:var(--font-d);font-size:1.4rem;font-weight:300;color:var(--paper);margin-bottom:.3rem;}
.paq-card.featured .paq-name{color:var(--ink);}
.paq-precio{font-family:var(--font-d);font-size:2rem;font-weight:300;color:var(--paper);line-height:1;}
.paq-card.featured .paq-precio{color:var(--ink);}
.paq-precio-sub{font-size:.55rem;letter-spacing:.1em;color:rgba(250,247,242,.35);vertical-align:middle;}
.paq-card.featured .paq-precio-sub{color:rgba(14,12,10,.4);}
.paq-card-body{padding:1.25rem 1.5rem 1.5rem;background:rgba(250,247,242,.02);}
.paq-ahorro-tag{font-size:.58rem;color:#5BAA5B;margin-bottom:.85rem;padding:.35rem .65rem;background:rgba(91,170,91,.1);border-left:2px solid #5BAA5B;}
.paq-items{display:flex;flex-direction:column;gap:.38rem;margin-bottom:1.1rem;}
.paq-item{font-size:.72rem;color:rgba(250,247,242,.6);line-height:1.5;}
.paq-individual-prices{display:flex;flex-direction:column;gap:.2rem;margin-bottom:1rem;padding-top:.75rem;border-top:1px solid rgba(250,247,242,.06);}
.paq-individual-prices span{font-size:.6rem;color:rgba(250,247,242,.28);}
.paq-individual-prices s{color:rgba(250,247,242,.2);}
.paq-cta{display:block;width:100%;padding:.85rem;text-align:center;font-family:var(--font-b);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;transition:all .2s;border:none;cursor:pointer;}
.paq-cta.primary{background:var(--gold);color:var(--ink);}
.paq-cta.primary:hover{background:var(--gold-l);}
.paq-cta.secondary{background:transparent;color:rgba(250,247,242,.6);border:1px solid rgba(250,247,242,.15);}
.paq-cta.secondary:hover{border-color:var(--gold);color:var(--gold);}
@media(max-width:640px){
  .paquetes-section{padding:3.5rem 1.25rem;}
  .paq-grid{grid-template-columns:1fr;}
}


/* == PORTAFOLIO POR SEDE == */
.pf-sede-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:3px;
  min-height:400px;
}
.pf-sede-photo{
  position:relative;overflow:hidden;cursor:pointer;
  background:#111;
}
.pf-sede-photo .ph-inner{padding-top:120%;}
.pf-sede-photo.wide .ph-inner{padding-top:60%;}
.pf-sede-photo.wide{grid-column:span 2;}
.pf-sede-photo img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
}
.pf-sede-photo:hover img{transform:scale(1.05);}
.pf-sede-photo .ph-grad{
  position:absolute;inset:0;
  background:center/cover no-repeat;
  transition:transform 0.6s;
}
.pf-sede-photo:hover .ph-grad{transform:scale(1.05);}
.pf-sede-cta{
  padding:2rem 4rem;
  text-align:center;
  border-top:1px solid rgba(14,12,10,0.06);
}
@media(max-width:640px){
  .pf-sede-photo.wide{grid-column:span 1;}
  .pf-sede-photo.wide .ph-inner{padding-top:120%;}
  .pf-sede-cta{padding:1.5rem 1.25rem;}
}

/* == CABALLOS GRID == */
.caballos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1rem;
  margin-top:0.5rem;
}
.caballo-card{
  border:1px solid rgba(14,12,10,0.08);
  background:#FFFFFF;
  overflow:hidden;
  transition:all 0.3s;
}
.caballo-card:hover{border-color:rgba(196,154,60,0.4);transform:translateY(-3px);box-shadow:0 8px 24px rgba(14,12,10,0.08);}
.caballo-photo{height:180px;background:center/cover no-repeat;}
.caballo-body{padding:0.85rem 1rem;}
.caballo-name{font-family:var(--font-d);font-size:1.1rem;color:var(--ink);margin-bottom:2px;}
.caballo-precio{font-size:0.95rem;color:var(--gold);font-weight:500;margin-bottom:4px;}
.caballo-lugar{font-size:0.58rem;color:var(--muted);letter-spacing:0.08em;display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.caballo-nota{font-size:0.62rem;color:rgba(14,12,10,0.45);line-height:1.5;margin-bottom:8px;}
.caballo-tags{display:flex;flex-wrap:wrap;gap:0.3rem;}
.caballo-tag{font-size:0.48rem;padding:0.15rem 0.5rem;border:1px solid rgba(14,12,10,0.1);color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}


/* Caballos paquete grid */
#paq-caballos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1.25rem;
  max-width:1100px;
  margin:0 auto;
  padding:0 1rem;
}
.horse-paq-card{
  border:1px solid rgba(14,12,10,0.1);
  background:#FFFFFF;
  overflow:hidden;
  transition:all 0.3s;
}
.horse-paq-card:hover{border-color:rgba(196,154,60,0.4);transform:translateY(-3px);box-shadow:0 12px 32px rgba(14,12,10,0.08);}
.horse-paq-photo{height:200px;background:center/cover no-repeat;}
.horse-paq-body{padding:1rem 1.1rem 1.25rem;}
.horse-paq-name{font-family:var(--font-d);font-size:1.25rem;color:var(--ink);margin-bottom:3px;}
.horse-paq-price{font-size:1.1rem;color:var(--gold);font-weight:500;margin-bottom:5px;}
.horse-paq-lugar{font-size:0.58rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px;}

/* ======================================
   PORTAFOLIO · Galería por artista
====================================== */
.portfolio{
  background:#0A0806;
  padding:0;
  overflow:hidden;
}

/* Header */
.pf-header{
  padding:5rem 4rem 4rem;
  display:grid;grid-template-columns:1fr auto;align-items:end;gap:2rem;
  border-bottom:1px solid rgba(14,12,10,0.08);
}
.pf-tag{font-size:0.52rem;letter-spacing:0.42em;text-transform:uppercase;color:var(--gold);
  display:flex;align-items:center;gap:0.65rem;margin-bottom:1.1rem;}
.pf-tag::before{content:'';width:18px;height:1px;background:var(--gold);}
.pf-title{font-family:var(--font-d);font-size:clamp(2.2rem,4vw,3.8rem);font-weight:300;
  color:var(--paper);line-height:1.05;letter-spacing:-0.01em;}
.pf-title em{font-style:italic;color:var(--gold-l);}
.pf-desc{font-size:0.72rem;color:rgba(14,12,10,0.45);line-height:1.9;max-width:320px;text-align:right;}

/* Sede tabs */
.pf-tabs{
  display:flex;border-bottom:1px solid rgba(196,154,60,0.1);
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.pf-tab{
  padding:1.1rem 2rem;font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(250,247,242,0.3);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;
  font-family:var(--font-b);
}
.pf-tab:hover{color:rgba(250,247,242,0.6);}
.pf-tab.active{color:var(--gold-l);border-bottom-color:var(--gold);}

/* Sede panel */
.pf-sede{display:none;}/* handled by JS */
/* .pf-sede.active handled by JS */

/* Artist row */
.pf-artist{
  border-bottom:1px solid rgba(196,154,60,0.08);
  padding:3rem 4rem;
}
.pf-artist:last-child{border-bottom:none;}

/* Artist header */
.pf-artist-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;flex-wrap:wrap;gap:1rem;
}
.pf-artist-left{display:flex;align-items:center;gap:1.5rem;}
.pf-artist-avatar{
  width:64px;height:64px;border-radius:50%;
  border:1px solid rgba(196,154,60,0.3);
  overflow:hidden;flex-shrink:0;position:relative;
}
.pf-artist-avatar-bg{
  width:100%;height:100%;
  background:center/cover no-repeat;
}
.pf-artist-info{}
.pf-artist-type{font-size:0.46rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:4px;}
.pf-artist-name{font-family:var(--font-d);font-size:1.6rem;font-weight:400;
  color:var(--paper);line-height:1;}
.pf-artist-role{font-size:0.65rem;color:rgba(14,12,10,0.45);margin-top:3px;}
.pf-artist-meta{display:flex;align-items:center;gap:2rem;}
.pf-meta-item{text-align:center;}
.pf-meta-num{font-family:var(--font-d);font-size:1.4rem;font-weight:300;color:var(--gold-l);}
.pf-meta-lbl{font-size:0.46rem;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(250,247,242,0.25);margin-top:2px;}

/* Tags */
.pf-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:2rem;}
.pf-tag-item{padding:0.25rem 0.7rem;border:1px solid rgba(196,154,60,0.18);
  font-size:0.52rem;letter-spacing:0.1em;color:rgba(250,247,242,0.4);}

/* Photo grid - masonry-like */
.pf-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:4px;
}
.pf-grid.six{grid-template-columns:repeat(6,1fr);}

.pf-photo{
  position:relative;overflow:hidden;
  background:#111;cursor:pointer;
}
.pf-photo::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0);
  transition:background 0.3s;
}
.pf-photo:hover::after{background:rgba(196,154,60,0.15);}
.pf-photo-bg{
  width:100%;height:100%;
  background:center/cover no-repeat;
  transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
}
.pf-photo:hover .pf-photo-bg{transform:scale(1.05);}

/* Aspect ratios for variety */
.pf-photo.tall{grid-row:span 2;}
.pf-photo.wide{grid-column:span 2;}
.pf-photo.sq{aspect-ratio:1;}
.pf-photo .ph-inner{padding-top:120%;}/* portrait default */
.pf-photo.sq .ph-inner{padding-top:100%;}
.pf-photo.tall .ph-inner{padding-top:0;height:100%;}
.pf-photo.wide .ph-inner{padding-top:56%;}

/* Placeholder gradients - queued by position */
.pg-ph{position:absolute;inset:0;}
.pg-c1{background:linear-gradient(160deg,#1A1208,#C49A3C 80%,#F0D890);}
.pg-c2{background:linear-gradient(200deg,#120E18,#4A2A5A 60%,#C090D0);}
.pg-c3{background:linear-gradient(140deg,#0E1A10,#2A4A2E 60%,#90C098);}
.pg-c4{background:linear-gradient(180deg,#1A0E0A,#4A1A10 60%,#D08060);}
.pg-c5{background:linear-gradient(160deg,#0A0E1A,#1A2A4A 60%,#6090C0);}
.pg-c6{background:linear-gradient(150deg,#181410,#3A2E1A 60%,#C0A060);}
.pg-c7{background:linear-gradient(170deg,#1A0E14,#4A1A2E 60%,#C06080);}
.pg-c8{background:linear-gradient(145deg,#0E180A,#1E3A18 60%,#70A878);}

/* Photo hover zoom icon */
.pf-photo-zoom{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  width:44px;height:44px;border-radius:50%;
  background:rgba(196,154,60,0.9);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;z-index:2;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.pf-photo:hover .pf-photo-zoom{transform:translate(-50%,-50%) scale(1);}

/* Price strip below each artist */
.pf-price-strip{
  margin-top:1.5rem;
  padding:1rem 1.25rem;
  border:1px solid rgba(196,154,60,0.15);
  background:rgba(196,154,60,0.03);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;
}
.pf-price-info{}
.pf-price-val{font-family:var(--font-d);font-size:1.3rem;color:var(--gold-l);font-weight:300;}
.pf-price-lbl{font-size:0.5rem;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(250,247,242,0.25);margin-top:2px;}
.pf-price-note{font-size:0.6rem;color:rgba(14,12,10,0.4);margin-top:3px;}
.pf-book-btn{
  padding:0.65rem 1.5rem;background:var(--gold);color:var(--ink);
  border:none;font-family:var(--font-b);font-size:0.6rem;font-weight:500;
  letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;
  text-decoration:none;display:inline-block;transition:opacity 0.2s;
}
.pf-book-btn:hover{opacity:0.85;}

/* Lightbox */
.lb-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(5,4,3,0.97);
  display:none;align-items:center;justify-content:center;
  padding:1rem;
}
.lb-overlay.open{display:flex;}
.lb-img{
  max-width:90vw;max-height:90vh;
  object-fit:contain;
  animation:lbIn 0.3s ease both;
}
@keyframes lbIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:none}}
.lb-img-placeholder{
  width:min(80vw,700px);height:min(80vh,500px);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;color:rgba(250,247,242,0.2);letter-spacing:0.2em;
  animation:lbIn 0.3s ease both;
}
.lb-close{

// Cache: artistKey → array of photo URLs from Supabase
let sbPhotos = {};

async function loadSupabasePhotos(){
  try {
    if(typeof supabase === 'undefined') return;
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data, error } = await sb
      .from('proveedores')
      .select('nombre, sede, portafolio(url, orden)')
      .order('nombre');
    if(error || !data) return;

    data.forEach(p => {
      const keyMap = NOMBRE_TO_KEY[p.nombre];
      if(!keyMap) return;
      const key = keyMap[p.sede] || Object.values(keyMap)[0];
      if(!key) return;
      const fotos = (p.portafolio||[])
        .sort((a,b)=>(a.orden||0)-(b.orden||0))
        .map(f=>f.url)
        .filter(Boolean);
      if(fotos.length) sbPhotos[key] = fotos;
    });

    // Rebuild all grids with real photos
    Object.keys(PF_ARTISTS).forEach((key,i) => {
      const gridId = 'grid-' + key;
      buildGrid(gridId, key, i%2);
    });
  } catch(e){ console.warn('Supabase photos:', e.message); }
}

function buildGrid(gridId, artistKey, layoutIdx=0){
  const el = document.getElementById(gridId);
  if(!el) return;
  const artist = PF_ARTISTS[artistKey];
  if(!artist) return;
  const layout = LAYOUTS[layoutIdx % LAYOUTS.length];
  const realPhotos = sbPhotos[artistKey] || [];
  const total = realPhotos.length > 0 ? Math.min(realPhotos.length, 12) : artist.photos;
  let html = '';
  for(let i=0;i<total;i++){
    const l = layout[i % layout.length];
    const ang = 140 + (i*20)%80;
    const bg = artist.gradient.replace('160deg', ang+'deg');
    const photoUrl = realPhotos[i] || null;
    const style = photoUrl
      ? `background:url('${photoUrl}') center/cover no-repeat`
      : `background:${bg} center/cover no-repeat`;
    html += `<div class="pf-photo${l.cls?' '+l.cls:''}" onclick="openLb('${artistKey}',${i})" style="${l.row?'grid-row:span 2':''}${l.col?';grid-column:span 2':''}">
      <div class="ph-inner" style="padding-top:${l.row?'0':'100%'};${l.row?'height:100%':''}">
        <div class="pg-ph" style="${style}"></div>
      </div>
      <div class="pf-photo-zoom">&#128269;</div>
    </div>`;
  }
  el.innerHTML = html;
}

function lbNav(dir){

function renderLb(){
  const artist = PF_ARTISTS[lbArtist];
  if(!artist) return;
  const ang = 140+(lbIndex*20)%80;
  const bg = artist.gradient.replace('160deg',ang+'deg');

  document.getElementById('lbInfo').textContent=`${artist.name} . ${artist.sede} . Foto ${lbIndex+1} de ${artist.photos}`;
}
document.addEventListener('keydown',e=>{
